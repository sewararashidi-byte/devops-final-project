<!DOCTYPE html>
<html>
<head>
    <title>DevOps Final Project</title>
</head>
<body>
    <h1>DevOps Final Project</h1>
    <p>Welcome to my Flask web application.</p>

    <h2>Display Data: DevOps Tasks</h2>
    <ul>
        {% for task in tasks %}
            <li>{{ task }}</li>
        {% endfor %}
    </ul>

    <h2>Simple Form</h2>
    <form method="POST">
        <input type="text" name="task" placeholder="Enter a new task">
        <button type="submit">Add Task</button>
    </form>

    <h2>API Endpoint</h2>
    <p>Visit: <a href="/api/tasks">/api/tasks</a></p>
</body>
</html>
